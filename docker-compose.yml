version: '3.8'
services:
  xray:
    image: teddysun/xray:latest
    container_name: xray
    restart: unless-stopped
    ports:
      - "443:443"
    volumes:
      - ./xray:/etc/xray
    networks:
      - vpn_network
  backend:
    build: 
      context: ./backend
    container_name: vpn_backend
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    environment:
      - XRAY_API_ADDR=xray:10085
      - SERVER_IP=88.210.12.157
      - REALITY_PUBLIC_KEY=i93o6PySat2k3YtBO9GdvpvkDFTNWadgxAJVSUZxUQE
      - REALITY_SHORT_ID=22752d49bd4ef0f0
    networks:
      - vpn_network
    depends_on:
      - xray
  frontend:
    build:
      context: ./frontend
    container_name: vpn_frontend
    restart: unless-stopped
    ports:
      - "8080:3000"
    networks:
      - vpn_network
    depends_on:
      - backend
networks:
  vpn_network:
    driver: bridge
